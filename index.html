<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Home Work - Предмети</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f9fbfd;
            margin: 0;
            padding: 20px;
        }

        /* Шапка з логотипом */
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            padding: 10px 50px;
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
        }

        .logo-text {
            font-weight: bold;
            font-size: 24px;
            color: #2c3e50;
        }

        /* Секція предметів */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }

        .subjects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 20px;
        }

        .subject-card {
            background: white;
            border: 1px solid #e0e6ed;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border-color: #3498db;
        }

        .subject-icon {
            font-size: 40px;
            margin-bottom: 10px;
            display: block;
        }

        .subject-name {
            font-weight: 600;
            font-size: 14px;
            color: #2c3e50;
        }

        .subject-subtext {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
            display: block;
        }
    </style>
</head>
<body>

    <header class="header">
        <img src="https://lh3.googleusercontent.com/gg-dl/AOI_d__GKcdu8dO5PntXHwJQEFsJidN5cxvH2NvU8HnztFPIToT7XKVw7LmJVxkZplGNINlICFuKleH1nX90XHrHA08JFs-c_Rz8vxdTxSKmy8Af9Jg-iWP-Qiug1U08sTNerJahWT42SpRrVsl2q6WPBN7fACtwO_CYWTSJr9k_VoeRj2J8-Q=s1024-rj" alt="Logo" class="logo" onerror="this.src='https://via.placeholder.com/50'">
        <div class="logo-text">ГДЗ <span style="font-weight: normal; font-size: 16px; color: #3498db;">EASY HOME WORK</span></div>
    </header>

    <div class="container">
        <h2 class="section-title">Популярні Предмети</h2>
        
        <div class="subjects-grid">
            <div class="subject-card">
                <span class="subject-icon">📐</span>
                <span class="subject-name">Алгебра</span>
                <span class="subject-subtext">Алгебра ></span>
            </div>

            <div class="subject-card">
                <span class="subject-icon">📐</span>
                <span class="subject-name">Геометрія</span>
                <span class="subject-subtext">Геометрія ></span>
            </div>

            <div class="subject-card">
                <span class="subject-icon">📖</span>
                <span class="subject-name">Укр. мова</span>
                <span class="subject-subtext">Мова ></span>
            </div>

            <div class="subject-card">
                <span class="subject-icon">🇬🇧</span>
                <span class="subject-name">Англ. мова</span>
                <span class="subject-subtext">English ></span>
            </div>

            <div class="subject-card">
                <span class="subject-icon">🌍</span>
                <span class="subject-name">Історія</span>
                <span class="subject-subtext">Історія ></span>
            </div>

            <div class="subject-card">
                <span class="subject-icon">⚛️</span>
                <span class="subject-name">Фізика</span>
                <span class="subject-subtext">Фізика ></span>
            </div>
        </div>
    </div>

</body>
</html>
